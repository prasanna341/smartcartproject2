{% extends "base.html" %}

{% block title %}Verify OTP{% endblock %}

{% block content %}

<div class="container-fluid d-flex justify-content-center align-items-center" style="min-height:85vh;">

    <div class="col-11 col-sm-8 col-md-6 col-lg-4">

        <div class="card shadow-lg border-0 rounded-4">
            <div class="card-body p-4 p-md-5">

                <h4 class="text-center mb-4 fw-bold">
                    Verify OTP
                </h4>

                {% with messages = get_flashed_messages(with_categories=true) %}
                  {% for category, message in messages %}
                    <div class="alert alert-{{ category }} text-center py-2">
                        {{ message }}
                    </div>
                  {% endfor %}
                {% endwith %}

                <form method="POST" action="/verify-otp">

                    <!-- OTP -->
                    <div class="mb-3">
                        <label class="form-label small fw-semibold">Enter OTP</label>
                        <input type="text" name="otp" class="form-control form-control-lg text-center" maxlength="6" required>
                    </div>

                    <!-- Password -->
                    <div class="mb-4">
                        <label class="form-label small fw-semibold">Create Password</label>
                        <input type="password" name="password" class="form-control form-control-lg" required>
                    </div>

                    <!-- Button -->
                    <div class="d-grid">
                        <button class="btn btn-primary btn-lg rounded-3">
                            Verify & Register
                        </button>
                    </div>

                </form>

            </div>
        </div>

    </div>

</div>

{% endblock %}
