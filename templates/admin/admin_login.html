{% extends "base.html" %}

{% block content %}

<div class="container-fluid d-flex justify-content-center align-items-center" style="min-height: 85vh;">

    <div class="col-11 col-sm-8 col-md-6 col-lg-4">

        <div class="card shadow-lg border-0 rounded-4">

            <div class="card-body p-4">

                <h3 class="text-center mb-4 fw-bold">Admin Login</h3>

                <form method="POST">

                    <!-- Email -->
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Email</label>
                        <input type="email" name="email" class="form-control form-control-lg" placeholder="Enter email" required>
                    </div>

                    <!-- Password -->
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Password</label>
                        <input type="password" name="password" class="form-control form-control-lg" placeholder="Enter password" required>
                    </div>

                    <!-- Button -->
                    <div class="d-grid mt-3">
                        <button type="submit" class="btn btn-primary btn-lg rounded-3">
                            Login
                        </button>
                    </div>

                    <!-- Register Link -->
                    <p class="text-center mt-4 mb-0">
                        Don’t have an account?
                        <a href="/admin-signup" class="fw-semibold text-decoration-none">
                            Register
                        </a>
                    </p>

                </form>

            </div>
        </div>

    </div>

</div>

{% endblock %}
